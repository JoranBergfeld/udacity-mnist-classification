name: baseline_mlp
seed: 42
data:
  batch_size: 128
  val_split: 0.1
  augmentation: none
  num_workers: 0
model:
  name: mlp
  kwargs:
    hidden: [256, 128]
    dropout: 0.2
optimizer:
  name: adam
  lr: 0.001
  weight_decay: 0.0
scheduler:
  name: none
training:
  epochs: 10
  label_smoothing: 0.0
  early_stopping_patience: 0
