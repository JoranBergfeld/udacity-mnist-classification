name: top1_resnet_small_heavy
seed: 42
data:
  batch_size: 128
  val_split: 0.1
  augmentation: affine
  num_workers: 0
model:
  name: resnet_small
  kwargs:
    dropout: 0.3
optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0005
scheduler:
  name: cosine
  kwargs:
    t_max: 15
training:
  epochs: 15
  label_smoothing: 0.1
  early_stopping_patience: 0
