name: cnn_deep_affine_cosine
seed: 42
data:
  batch_size: 128
  val_split: 0.1
  augmentation: affine_erasing
  num_workers: 0
model:
  name: deeper_cnn
  kwargs:
    dropout: 0.3
optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0005
scheduler:
  name: cosine
  kwargs:
    t_max: 20
training:
  epochs: 20
  label_smoothing: 0.1
  early_stopping_patience: 5
