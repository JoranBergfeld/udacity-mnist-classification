name: cnn_basic
seed: 42
data:
  batch_size: 128
  val_split: 0.1
  augmentation: none
  num_workers: 0
model:
  name: simple_cnn
  kwargs:
    dropout: 0.25
optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0001
scheduler:
  name: cosine
  kwargs:
    t_max: 10
training:
  epochs: 10
  label_smoothing: 0.0
  early_stopping_patience: 0
