name: top3_deeper_cnn_light
seed: 42
data:
  batch_size: 128
  val_split: 0.1
  augmentation: affine
  num_workers: 0
model:
  name: deeper_cnn
  kwargs:
    dropout: 0.2
optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0
scheduler:
  name: cosine
  kwargs:
    t_max: 15
training:
  epochs: 15
  label_smoothing: 0.0
  early_stopping_patience: 0
